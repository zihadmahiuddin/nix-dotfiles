source=./mocha.conf

monitor=,preferred,auto,auto

exec-once = hyprpaper
exec-once = waybar
exec-once = wl-paste --watch cliphist store
# exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = sleep 5 && keepassxc # give enough time for waybar to ready, otherwise the tray icons don't appear...
exec-once = sleep 5 && megasync

env = XCURSOR_SIZE,24

## Settings

general {
  col.active_border = $pink
  col.inactive_border = $surface0

  col.group_border_active = $flamingo
  col.group_border = $surface0
}

decoration {
  rounding = 10
  blur_size = 3

  col.shadow = $surface0
  col.shadow_inactive = $surface0
}

animations {
  enabled = yes

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05

  animation = windows, 1, 7, myBezier
  animation = windowsOut, 1, 7, default, popin 80%
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, default
  animation = workspaces, 1, 6, default
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

dwindle {
  pseudotile = yes
  preserve_split = yes
}

master {
  new_is_master = true
}

## Keybinds

# Set main modifier key to SUPER/WIN/LOGO key
$mainMod = SUPER

# Open terminal with mainMod + Return
bind = $mainMod, Return, exec, kitty
# Kill active window with mainMod + Q
bind = $mainMod, Q, killactive,
# Exit hyprland with mainMod + Shift + Q
bind = $mainMod SHIFT CTRL, Q, exit,
# Open file explorer with mainMod + E
bind = $mainMod, E, exec, thunar
# Toggle full screen mode with mainMod + Space
bind = $mainMod, F, fullscreen,
# Toggle floating mode with mainMod + Space
bind = $mainMod, Space, togglefloating,
# Open wofi drun menu with mainMod + R
bind = $mainMod, R, exec, rofi -show drun
# Toggle pseudo mode with mainMod + P
bind = $mainMod, P, pseudo,
# Toggle split direction with mainMod + V
bind = $mainMod, V, togglesplit,

# Move focus with mainMod + hjkl
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move focus with mainMod + hjkl
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + Tab/mainMod + Shift + Tab
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

# Move active window to special (scratchpad)
bind = $mainMod SHIFT, S, movetoworkspace, special
# Bring special (scratchpad) workspace to front
bind = CTRL ALT, S, togglespecialworkspace,

# Start screenshot utility
bind = , Print, exec, watershot

# Launch wlogout menu
bind = $mainMod, X, exec, wlogout

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Mute, Volume Up and Volume Down, Play, Pause, Next, Prev FN keys
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioRaiseVolume, exec, pamixer -i 2
bind = , XF86AudioLowerVolume, exec, pamixer -d 2

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

## Window Rules

windowrule = workspace 1,^(kitty)(.*)$
windowrule = workspace 2,^(Brave-browser)(.*)$
windowrule = workspace 3,^(Code|jetbrains-idea-*)(.*)$
windowrule = workspace 4,^(discord)(.*)$
windowrule = workspace 5,^(mpv|csgo_linux64|osu!.exe|Minecraft|Viewnior)(.*)$
windowrule = workspace special,^(PrismLauncher|Spotify)(.*)$
windowrule = float,^(mpv)(.*)$
windowrule = fullscreen,^(osu!.exe)(.*)$
