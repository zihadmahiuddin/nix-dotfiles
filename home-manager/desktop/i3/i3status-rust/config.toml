[[block]]
alert = 10.0
block = "disk_space"
info_type = "available"
interval = 60
path = "/"
warning = 20.0

[[block]]
block = "memory"
format = " $icon $mem_used.eng(prefix:M)/$mem_total.eng(prefix:M) ($mem_total_used_percents.eng(w:2)) "

[[block]]
block = "cpu"
interval = 1

[[block]]
block = "sound"
step_width = 2
max_vol = 130

[[block]]
block = "time"
format = " $timestamp.datetime(f:'%a %d/%m %R') "
interval = 60

[icons]
icons = "awesome6"

[theme]
theme = "nord-dark"
